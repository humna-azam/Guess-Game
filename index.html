<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="icon-box">
            <img src="https://cdn-icons-png.flaticon.com/512/3039/3039430.png" alt="Target Icon" width="80">
        </div>
        
        <h1>Guess The Number</h1>
        <p>I have picked a number between 1 and 10. Can you guess it?</p>
        
        <input type="number" id="userGuess" placeholder="Enter number">
        
        <button onclick="checkGuess()">Check Guess</button>

        <div id="resultBox" class="result-message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
